<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sales OS - Intelligence PE 27</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2310b981'/><text x='50' y='50' font-family='Arial, sans-serif' font-size='40' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>L'O</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafaf9; margin: 0; padding: 0; color: #1c1917; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
        
        .pulse-yellow { animation: pulse-yellow 2s infinite; }
        .pulse-red { animation: pulse-red 2s infinite; }
        .pulse-orange { animation: pulse-orange 2s infinite; }
        @keyframes pulse-yellow { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(249, 115, 22, 0); } 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }

        .light-red { background-color: #ef4444; border: 1px solid #fee2e2; }
        .light-yellow { background-color: #f59e0b; border: 1px solid #fef3c7; }
        .light-green { background-color: #10b981; border: 1px solid #d1fae5; }
        .light-blue { background-color: #6366f1; border: 1px solid #e0e7ff; }
        .light-off { background-color: #f5f5f4; border: 1px solid #e7e5e4; }
        
        .modal-fade-in { animation: modalFadeIn 0.2s ease-out; }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        .bg-pattern { background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configurazione Firebase (Database e Login)
        const firebaseConfig = { 
            apiKey: "AIzaSyCb-tMn2i9UTzQ_D1xH7E7BPtITiccHoHQ", 
            authDomain: "app-ordini-2ce45.firebaseapp.com", 
            projectId: "app-ordini-2ce45", 
            storageBucket: "app-ordini-2ce45.firebasestorage.app", 
            messagingSenderId: "476434424317", 
            appId: "1:476434424317:web:fae0d97d8fc8803301b994" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const envAppId = typeof __app_id !== 'undefined' ? __app_id : 'app-ordini-2ce45';

        window.FirebaseOps = { auth, db, envAppId, collection, onSnapshot, doc, setDoc, serverTimestamp, onAuthStateChanged, signInWithEmailAndPassword, signOut };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Phone: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>,
            Calendar: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>,
            Search: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>,
            History: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>,
            X: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>,
            Chart: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
            Notebook: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
            ChevronDown: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>,
            Plus: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
            Map: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>,
            AlertTriangle: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Sparkles: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            Target: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>,
            Zap: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            LogOut: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        };

        const HEADERS_MAP = {
            'lofficina': "L'Officina snc", 'circondato': "Circondato srl", 'eureka': "Eureka srl", 
            'magia': "Magia Diffusion", 'bio-optimus': "Bio Optimus", 'damalu': "Luisanne", 'verbenas': "Fun Verbenas"
        };

        // Chiave API di Gemini (Radar AI)
        const apiKey = "AIzaSyAAlh1oF3MsdwSBhe6CkX4hLDLqLUFJhYE"; 

        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setError('');
                try {
                    await window.FirebaseOps.signInWithEmailAndPassword(window.FirebaseOps.auth, email, password);
                } catch (err) {
                    setError("Credenziali errate o account non esistente.");
                    setIsLoggingIn(false);
                }
            };

            return (
                <div className="min-h-screen bg-stone-900 flex flex-col items-center justify-center p-4 bg-pattern">
                    <form onSubmit={handleLogin} className="bg-white p-8 md:p-10 rounded-[2rem] shadow-2xl w-full max-w-sm flex flex-col gap-6 border border-stone-200 fade-in">
                        <div className="text-center">
                            <div className="w-16 h-16 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-3xl font-black mx-auto mb-5 tracking-tighter shadow-lg shadow-emerald-500/30">L'O</div>
                            <h1 className="text-3xl font-extrabold text-stone-800 tracking-tight">Sales OS</h1>
                            <p className="text-sm text-stone-500 mt-1 font-semibold uppercase tracking-widest">Area Riservata</p>
                        </div>
                        {error && <div className="bg-rose-50 text-rose-600 p-4 rounded-xl text-xs text-center border border-rose-200 font-bold flex items-center gap-2"><Icons.AlertTriangle /> {error}</div>}
                        <div className="space-y-4">
                            <input type="email" placeholder="nome@agenzia.com" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-stone-50 border border-stone-200 rounded-xl text-sm font-semibold outline-none focus:border-emerald-500 transition-all text-stone-800" required />
                            <input type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-stone-50 border border-stone-200 rounded-xl text-sm font-semibold outline-none focus:border-emerald-500 transition-all text-stone-800" required />
                        </div>
                        <button type="submit" disabled={isLoggingIn} className="w-full bg-stone-900 text-white p-4 rounded-xl font-bold hover:bg-emerald-600 transition-colors shadow-md disabled:opacity-50">
                            {isLoggingIn ? 'Verifica...' : 'Accedi al Sistema'}
                        </button>
                    </form>
                </div>
            );
        };

        function App() {
            const [firebaseReady, setFirebaseReady] = useState(!!window.FirebaseOps);
            const [user, setUser] = useState(null);
            const [isInitializing, setIsInitializing] = useState(true);
            const [customers, setCustomers] = useState([]);
            const [orders, setOrders] = useState([]);
            const [agenda, setAgenda] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedClient, setSelectedClient] = useState(null);
            const [targetSeason, setTargetSeason] = useState("PE_27");
            const [activeView, setActiveView] = useState("call-list"); 
            const [scoutCity, setScoutCity] = useState('');
            const [isScouting, setIsScouting] = useState(false);
            const [scoutResults, setScoutResults] = useState([]);
            const [dbStatus, setDbStatus] = useState("Scollegato");

            const appId = 'app-ordini-2ce45'; 

            useEffect(() => {
                if (!window.FirebaseOps) {
                    const handleReady = () => setFirebaseReady(true);
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }
            }, []);

            useEffect(() => {
                if (!firebaseReady) return;
                const { auth, onAuthStateChanged } = window.FirebaseOps;
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setIsInitializing(false);
                    if (currentUser) {
                        setLoading(true);
                        loadData();
                    }
                });
                return () => unsubscribe();
            }, [firebaseReady]);

            const loadData = () => {
                const { db, collection, onSnapshot } = window.FirebaseOps;
                const paths = [
                    { id: 'app-ordini-2ce45', c: 'artifacts/app-ordini-2ce45/public/data/anagrafica_clienti', o: 'artifacts/app-ordini-2ce45/public/data/orders' },
                    { id: 'lofficina', c: 'artifacts/app-ordini-lofficina-1/public/data/anagrafica_clienti', o: 'artifacts/app-ordini-lofficina-1/public/data/orders' }
                ];
                
                paths.forEach(p => {
                    onSnapshot(collection(db, p.c), s => {
                        const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setCustomers(prev => {
                            const map = new Map(prev.map(item => [item.name?.toLowerCase(), item]));
                            data.forEach(item => map.set(item.name?.toLowerCase(), item));
                            return Array.from(map.values());
                        });
                        setDbStatus("Online");
                    });
                    onSnapshot(collection(db, p.o), s => {
                        const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setOrders(prev => {
                            const map = new Map(prev.map(item => [item.id, item]));
                            data.forEach(item => map.set(item.id, item));
                            return Array.from(map.values());
                        });
                        setLoading(false);
                    });
                });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'agenda_luci'), s => {
                    setAgenda(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            };

            const processedClients = useMemo(() => {
                const aggregator = {};
                const initClient = (cName) => {
                    if (!aggregator[cName]) {
                        const rubrica = customers.find(c => c.name?.trim().toLowerCase() === cName.toLowerCase()) || {};
                        const statusRecord = agenda.find(a => a.clientName === cName) || { status: 'rosso', notes: '' };
                        const agente = (rubrica.agente || '').toLowerCase();
                        aggregator[cName] = {
                            name: cName, city: rubrica.city || 'N/D', phone: rubrica.phone || '', totalValue: 0,
                            lightStatus: statusRecord.status, notes: statusRecord.notes || '',
                            isMyAgent: !agente || agente.includes('officina') || agente.includes('quid'),
                            brands: new Set()
                        };
                    }
                    return aggregator[cName];
                };

                orders.forEach(o => {
                    const cName = o.clientData?.name?.trim();
                    if (!cName) return;
                    const client = initClient(cName);
                    if (o.orderMeta?.season === targetSeason) client.hasTargetSeason = true;
                    if (o.items) o.items.forEach(item => item.marchio && client.brands.add(item.marchio));
                    client.totalValue += (o.totals?.baseImponibileIva || 0);
                });

                let result = Object.values(aggregator).filter(c => !c.hasTargetSeason && c.totalValue > 0 && c.isMyAgent);
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(c => c.name.toLowerCase().includes(term));
                }
                return result.sort((a, b) => b.totalValue - a.totalValue);
            }, [customers, orders, agenda, searchTerm, targetSeason]);

            const handleScouting = async () => {
                if (!scoutCity) return;
                setIsScouting(true);
                try {
                    const prompt = `Trova 10 boutique multimarca reali a ${scoutCity}. Restituisci JSON: [{"name": "Nome", "address": "Indirizzo", "phone": "Tel", "score": 85, "reason": "Motivo"}]`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    setScoutResults(JSON.parse(data.candidates[0].content.parts[0].text));
                } catch (e) { alert("Errore AI: " + e.message); }
                finally { setIsScouting(false); }
            };

            if (!firebaseReady || isInitializing) return <div className="h-screen flex items-center justify-center bg-stone-900 text-stone-400 text-xs animate-pulse tracking-widest uppercase font-bold">Sales OS • Security Layer</div>;
            if (!user) return <LoginScreen />;
            if (loading) return <div className="h-screen flex items-center justify-center bg-stone-900 text-stone-400 text-xs animate-pulse tracking-widest uppercase font-bold">Caricamento Database...</div>;

            return (
                <div className="min-h-screen flex flex-col bg-stone-50 bg-pattern pb-10">
                    <nav className="bg-stone-900 text-stone-400 px-6 py-3 flex justify-between items-center text-[10px] font-black uppercase tracking-widest sticky top-0 z-50 shadow-xl">
                        <div className="flex gap-4 items-center">
                            <span className="flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div> DB: {dbStatus}</span>
                        </div>
                        <div className="flex gap-8 items-center">
                            <button onClick={() => setActiveView('call-list')} className={activeView === 'call-list' ? 'text-white' : ''}>Agenda</button>
                            <button onClick={() => setActiveView('scouting')} className={activeView === 'scouting' ? 'text-purple-400' : ''}>AI Radar</button>
                            <button onClick={() => window.FirebaseOps.signOut(window.FirebaseOps.auth)} className="hover:text-rose-400 transition-colors flex items-center gap-1.5"><Icons.LogOut /> Esci</button>
                        </div>
                    </nav>

                    <div className="max-w-3xl mx-auto px-4 py-8 w-full space-y-6">
                        {activeView === 'scouting' ? (
                            <div className="space-y-6 fade-in">
                                <header className="bg-gradient-to-br from-purple-800 to-indigo-950 p-8 rounded-[2.5rem] shadow-2xl text-white">
                                    <h2 className="text-3xl font-extrabold mb-2 flex items-center gap-3"><Icons.Target /> AI Radar</h2>
                                    <p className="text-purple-200/70 text-sm mb-6 font-medium">Trova nuovi clienti multimarca in zona.</p>
                                    <div className="flex gap-3">
                                        <input type="text" placeholder="Città..." className="flex-1 p-4 bg-white/10 border border-purple-400/30 rounded-2xl text-white outline-none focus:bg-white/20" value={scoutCity} onChange={e => setScoutCity(e.target.value)} />
                                        <button onClick={handleScouting} disabled={isScouting} className="bg-purple-500 px-8 rounded-2xl font-bold hover:bg-purple-400 shadow-lg shadow-purple-500/30 transition-all">{isScouting ? 'Ricerca...' : 'Cerca'}</button>
                                    </div>
                                </header>
                                {scoutResults.map((r, i) => (
                                    <div key={i} className="bg-white rounded-3xl p-6 border border-stone-200 shadow-sm flex justify-between items-center group hover:border-purple-300 transition-all">
                                        <div>
                                            <div className="flex items-center gap-3 mb-1">
                                                <span className="bg-emerald-100 text-emerald-700 text-[10px] font-black px-2 py-0.5 rounded-md">{r.score}/100</span>
                                                <h3 className="font-bold text-lg text-stone-800">{r.name}</h3>
                                            </div>
                                            <p className="text-xs text-stone-500 font-semibold">{r.address} • {r.phone}</p>
                                        </div>
                                        <button className="p-3 bg-stone-50 text-stone-400 rounded-2xl border border-stone-100 group-hover:bg-emerald-600 group-hover:text-white group-hover:border-emerald-600 transition-all"><Icons.Plus /></button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-6 fade-in">
                                <header className="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                                    <h1 className="text-4xl font-black tracking-tighter mb-4">Agenda {targetSeason.replace('_', ' ')}</h1>
                                    <div className="flex gap-4 items-center">
                                        <div className="flex-1 flex items-center bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus-within:ring-2 ring-indigo-500/50 transition-all">
                                            <Icons.Search className="w-4 h-4 text-slate-500 mr-2" />
                                            <input type="text" placeholder="Cerca cliente..." className="bg-transparent border-none outline-none text-sm w-full font-bold" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                        </div>
                                        <select className="p-3 bg-slate-800 border border-slate-700 rounded-2xl text-sm font-bold outline-none" value={targetSeason} onChange={e => setTargetSeason(e.target.value)}>
                                            <option value="PE_27">PE 27</option><option value="AI_27">AI 27</option>
                                        </select>
                                    </div>
                                </header>
                                <div className="grid grid-cols-1 gap-3">
                                    {processedClients.map((c, idx) => (
                                        <div key={idx} onClick={() => setSelectedClient(c)} className="bg-white p-5 rounded-3xl shadow-sm border border-stone-200 hover:border-indigo-400 transition-all cursor-pointer flex items-center justify-between group">
                                            <div className="flex items-center gap-5">
                                                <div className="flex flex-col gap-1 pr-5 border-r border-stone-100 shrink-0">
                                                    <div className={`w-3 h-3 rounded-full ${c.lightStatus === 'verde' ? 'light-green' : 'light-off'}`}></div>
                                                    <div className={`w-3 h-3 rounded-full ${c.lightStatus === 'giallo' ? 'light-yellow' : 'light-off'}`}></div>
                                                    <div className={`w-3 h-3 rounded-full ${c.lightStatus === 'rosso' ? 'light-red' : 'light-off'}`}></div>
                                                </div>
                                                <div className="overflow-hidden">
                                                    <h3 className="text-base font-bold text-stone-800 truncate">{c.name}</h3>
                                                    <p className="text-xs text-stone-500 font-bold tracking-tight uppercase">{c.city} • <span className="text-indigo-600">€{c.totalValue.toLocaleString()}</span></p>
                                                </div>
                                            </div>
                                            <div className="p-3 rounded-2xl bg-stone-50 text-stone-300 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-inner"><Icons.Phone /></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
