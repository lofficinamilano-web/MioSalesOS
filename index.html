<body>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const getWorkingDaysElapsed = (startDate) => {
            if (!startDate) return 0;
            const start = new Date(startDate);
            const end = new Date();
            let count = 0;
            let cur = new Date(start);
            while (cur < end) {
                cur.setDate(cur.getDate() + 1);
                const day = cur.getDay();
                if (day !== 0 && day !== 6) count++;
            }
            return count;
        };

        const Icons = {
            Phone: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>,

            Search: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>,

            X: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>,
            Chart: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
            Notebook: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
            ChevronDown: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>,
            Plus: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
            Map: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>,
            AlertTriangle: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Sparkles: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            Target: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>,
            Zap: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            Archive: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>,
            LogOut: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        };

        const HEADERS_MAP = {
            'lofficina': "L'Officina snc", 'circondato': "Circondato srl", 'eureka': "Eureka srl", 
            'magia': "Magia Diffusion", 'bio-optimus': "Bio Optimus", 'damalu': "Luisanne", 'verbenas': "Fun Verbenas"
        };

        const AGENCY_PORTFOLIO = [
            { id: 'verbenas', name: 'Verbenas', profile: 'casual, estivo, accessibile' },
            { id: 'bio-optimus', name: 'Bio Optimus', profile: 'comfort, plantare, benessere' },
            { id: 'circondato', name: 'Circondato', profile: 'fashion, donna, trend' },
            { id: 'magia', name: 'Magia Diffusion', profile: 'classico, donna, pelle' },
            { id: 'luisanne', name: 'Luisanne', profile: 'boutique, elegante' }
        ];

        // Chiave API di Gemini (Radar AI)
        const apiKey = "AIzaSyAAlh1oF3MsdwSBhe6CkX4hLDLqLUFJhYE"; 

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setError('');
                try {
                    await window.FirebaseOps.signInWithEmailAndPassword(window.FirebaseOps.auth, email, password);
                } catch (err) {
                    console.error("Errore di Login:", err);
                    setError("Credenziali errate o account non esistente.");
                    setIsLoggingIn(false);
                }
            };

            return (
                <div className="min-h-screen bg-stone-900 flex flex-col items-center justify-center p-4 bg-pattern">
                    <form onSubmit={handleLogin} className="bg-white p-8 md:p-10 rounded-[2rem] shadow-2xl w-full max-w-sm flex flex-col gap-6 border border-stone-200 fade-in">
                        <div className="text-center">
                            <div className="w-16 h-16 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-3xl font-black mx-auto mb-5 tracking-tighter shadow-lg shadow-emerald-500/30">L'O</div>
                            <h1 className="text-3xl font-extrabold text-stone-800 tracking-tight">Sales OS</h1>
                            <p className="text-sm text-stone-500 mt-1 font-semibold uppercase tracking-widest">Area Riservata</p>
                        </div>
                        {error && <div className="bg-rose-50 text-rose-600 p-4 rounded-xl text-xs text-center border border-rose-200 font-bold flex items-center gap-2"><Icons.AlertTriangle /> {error}</div>}
                        <div className="space-y-4">
                            <div>
                                <label className="block text-[10px] font-black text-stone-400 uppercase mb-2 tracking-wider pl-1">Email</label>
                                <input type="email" placeholder="nome@agenzia.com" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-stone-50 border border-stone-200 rounded-xl text-sm font-semibold outline-none focus:border-emerald-500 transition-all text-stone-800" required />
                            </div>
                            <div>
                                <label className="block text-[10px] font-black text-stone-400 uppercase mb-2 tracking-wider pl-1">Password</label>
                                <input type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-stone-50 border border-stone-200 rounded-xl text-sm font-semibold outline-none focus:border-emerald-500 transition-all text-stone-800" required />
                            </div>
                        </div>
                        <button type="submit" disabled={isLoggingIn} className="w-full bg-stone-900 text-white p-4 rounded-xl font-bold hover:bg-emerald-600 transition-colors shadow-md disabled:opacity-50">
                            {isLoggingIn ? 'Verifica in corso...' : 'Accedi al Sistema'}
                        </button>
                    </form>
                </div>
            );
        };

        function App() {
            const [firebaseReady, setFirebaseReady] = useState(!!window.FirebaseOps);
            const [user, setUser] = useState(null);
            const [isInitializing, setIsInitializing] = useState(true);
            const [customers, setCustomers] = useState([]);
            const [orders, setOrders] = useState([]);
            const [agenda, setAgenda] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedClient, setSelectedClient] = useState(null);
            const [showChart, setShowChart] = useState(null); 
            const [dbStatus, setDbStatus] = useState("In attesa...");
            const [targetSeason, setTargetSeason] = useState("PE_27");
            const [activeView, setActiveView] = useState("call-list"); 
            const [routingCity, setRoutingCity] = useState('');
            const [scoutCity, setScoutCity] = useState('');
            const [isScouting, setIsScouting] = useState(false);
            const [scoutResults, setScoutResults] = useState([]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [newClientData, setNewClientData] = useState({ name: '', city: '', phone: '', agente: "L'Officina" });

            const appId = 'app-ordini-2ce45'; 

            useEffect(() => {
                if (!window.FirebaseOps) {
                    const handleReady = () => setFirebaseReady(true);
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }
            }, []);

            useEffect(() => {
                if (!firebaseReady) return;
                const { auth, onAuthStateChanged } = window.FirebaseOps;
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setIsInitializing(false);
                    if (currentUser) {
                        setLoading(true);
                        loadData();
                    }
                });
                return () => unsubscribe();
            }, [firebaseReady]);

            const loadData = () => {
                const { db, collection, onSnapshot } = window.FirebaseOps;
                const paths = [
                    { id: 'app-ordini-2ce45', c: 'artifacts/app-ordini-2ce45/public/data/anagrafica_clienti', o: 'artifacts/app-ordini-2ce45/public/data/orders' },
                    { id: 'lofficina', c: 'artifacts/app-ordini-lofficina-1/public/data/anagrafica_clienti', o: 'artifacts/app-ordini-lofficina-1/public/data/orders' }
                ];
                
                paths.forEach(p => {
                    onSnapshot(collection(db, p.c), s => {
                        if (s.docs.length > 0) {
                            const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                            setCustomers(prev => {
                                const map = new Map(prev.map(item => [(item.name || '').trim().toLowerCase(), item]));
                                data.forEach(item => map.set((item.name || '').trim().toLowerCase(), item));
                                return Array.from(map.values());
                            });
                            setDbStatus("Online e Protetto");
                        }
                    });

                    onSnapshot(collection(db, p.o), s => {
                        if (s.docs.length > 0) {
                            const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                            setOrders(prev => [...prev, ...data].filter((v, i, a) => a.findIndex(t => t.id === v.id) === i));
                        }
                        setLoading(false);
                    });
                });
                
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'agenda_luci'), s => {
                    setAgenda(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            };

            const handleLogout = () => window.FirebaseOps.signOut(window.FirebaseOps.auth);

            const processedClients = useMemo(() => {
                const aggregator = {};
                const initClient = (cName) => {
                    if (!aggregator[cName]) {
                        const rubrica = customers.find(c => (c.name || '').trim().toLowerCase() === cName.toLowerCase()) || {};
                        const statusRecord = agenda.find(a => a.clientName === cName) || { status: 'rosso', lastUpdate: null, notes: '' };
                        const agente = (rubrica.agente || '').toLowerCase();
                        aggregator[cName] = {
                            name: cName, city: rubrica.city || 'N/D', phone: rubrica.phone || '', history: [], brands: new Set(), totalValue: 0,
                            lightStatus: statusRecord.status, notes: statusRecord.notes || '', isMyAgent: !agente || agente.includes('officina') || agente.includes('quid'),
                            agenteAssegnato: agente || 'Non Assegnato'
                        };
                    }
                    return aggregator[cName];
                };

                customers.forEach(c => c.name && initClient(c.name.trim()));
                orders.forEach(o => {
                    const cName = (o.clientData?.name || "Ignoto").trim();
                    if (!cName || cName === "Ignoto") return;
                    const client = initClient(cName);
                    if (o.orderMeta?.season === targetSeason) client.hasTargetSeason = true;
                    if (o.items) o.items.forEach(item => item.marchio && client.brands.add(item.marchio));
                    client.history.push({ season: o.orderMeta?.season || 'N/D', pairs: o.totals?.totalPieces || 0, value: o.totals?.baseImponibileIva || 0 });
                    client.totalValue += (o.totals?.baseImponibileIva || 0);
                });

                let result = Object.values(aggregator).filter(c => !c.hasTargetSeason);
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(c => c.name.toLowerCase().includes(term) || Array.from(c.brands).some(b => b.toLowerCase().includes(term)));
                }
                result.sort((a, b) => b.totalValue - a.totalValue);
                const main = result.filter(c => c.totalValue > 0 && c.isMyAgent);
                const historical = result.filter(c => !(c.totalValue > 0 && c.isMyAgent));
                return { main, historical };
            }, [customers, orders, agenda, searchTerm, targetSeason]);

            const handleScouting = async () => {
                if (!scoutCity) return alert("Inserisci una città.");
                setIsScouting(true);
                setScoutResults([]);
                
                try {
                    const prompt = `Sei un esperto commerciale calzature. Trova boutique multimarca reali a ${scoutCity}. Restituisci JSON: [{"name": "Nome", "address": "Indirizzo", "phone": "Tel", "score": 85, "reason": "Motivo", "suggested_brand": "Brand"}]`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!res.ok) throw new Error(`API Error: ${res.status}`);
                    const data = await res.json();
                    const parsedData = JSON.parse(data.candidates[0].content.parts[0].text);
                    setScoutResults(parsedData);
                } catch (error) {
                    alert("Scouting fallito: " + error.message);
                } finally {
                    setIsScouting(false);
                }
            };

            const renderClientCard = (c, idx) => (
                <div key={idx} onClick={() => setSelectedClient(c)} className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200 hover:border-indigo-300 transition-all cursor-pointer flex items-center justify-between group fade-in">
                    <div className="flex items-center gap-5">
                        <div className="flex flex-col gap-1 pr-5 border-r border-stone-100">
                            <div className={`w-3 h-3 rounded-full ${c.lightStatus === 'verde' ? 'light-green' : 'light-off'}`}></div>
                            <div className={`w-3 h-3 rounded-full ${c.lightStatus === 'giallo' ? 'light-yellow' : 'light-off'}`}></div>
                            <div className={`w-3 h-3 rounded-full ${c.lightStatus === 'rosso' ? 'light-red' : 'light-off'}`}></div>
                        </div>
                        <div>
                            <h3 className="text-[15px] font-bold text-stone-800">{c.name}</h3>
                            <p className="text-xs text-stone-500 font-medium">{c.city} • €{c.totalValue.toLocaleString()}</p>
                        </div>
                    </div>
                    <div className="p-2.5 rounded-xl bg-stone-50 text-stone-400 group-hover:bg-indigo-600 group-hover:text-white transition-all"><Icons.Phone /></div>
                </div>
            );

            if (!firebaseReady || isInitializing) return <div className="h-screen flex items-center justify-center bg-stone-900 text-stone-300 text-xs animate-pulse">Inizializzazione Ambiente Sicuro...</div>;
            if (!user) return <LoginScreen />;

            return (
                <div className="min-h-screen flex flex-col pb-10 bg-stone-50 bg-pattern">
                    <div className="bg-stone-900 text-stone-300 px-4 py-2 flex justify-between items-center text-[10px] font-semibold tracking-widest uppercase z-50 sticky top-0 shadow-md">
                        <div className="flex gap-4"><span>{dbStatus}</span></div>
                        <div className="flex gap-6 items-center">
                            <button onClick={() => setActiveView('call-list')} className={activeView === 'call-list' ? 'text-white' : ''}>Agenda</button>
                            <button onClick={() => setActiveView('scouting')} className={activeView === 'scouting' ? 'text-purple-300' : ''}>AI Radar</button>
                            <button onClick={handleLogout} className="text-stone-500 hover:text-white">Esci</button>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-4 py-8 w-full space-y-6">
                        {activeView === 'scouting' ? (
                            <div className="space-y-6 fade-in">
                                <header className="bg-gradient-to-br from-purple-800 to-indigo-950 p-8 rounded-[2rem] shadow-xl text-white">
                                    <h2 className="text-3xl font-extrabold mb-3 flex items-center gap-3"><Icons.Target /> AI Radar</h2>
                                    <p className="text-purple-200/90 text-sm mb-6">Inserisci una città per trovare nuovi prospect caldi.</p>
                                    <div className="flex gap-3">
                                        <input type="text" placeholder="Es. Crema..." className="flex-1 p-4 bg-white/10 border border-purple-400/30 rounded-2xl text-white outline-none focus:bg-white/20 transition-all" value={scoutCity} onChange={e => setScoutCity(e.target.value)} />
                                        <button onClick={handleScouting} disabled={isScouting} className="bg-purple-500 px-8 rounded-2xl font-bold hover:bg-purple-400 disabled:opacity-50">{isScouting ? 'Ricerca...' : 'Genera'}</button>
                                    </div>
                                </header>
                                {scoutResults.map((lead, i) => (
                                    <div key={i} className="bg-white rounded-2xl p-5 border border-stone-200 shadow-sm flex flex-col md:flex-row justify-between md:items-center gap-4">
                                        <div>
                                            <div className="flex items-center gap-3 mb-1">
                                                <span className="bg-emerald-100 text-emerald-700 text-[10px] font-black px-2 py-0.5 rounded">{lead.score}/100</span>
                                                <h3 className="font-bold text-lg text-stone-800">{lead.name}</h3>
                                            </div>
                                            <p className="text-xs text-stone-500">{lead.address} • {lead.phone}</p>
                                            <p className="text-sm text-stone-600 mt-2 font-medium italic">"{lead.reason}"</p>
                                        </div>
                                        <button className="bg-stone-900 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-emerald-600 transition-colors">Salva Prospect</button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-6 fade-in">
                                <header className="bg-slate-900 p-8 rounded-[2rem] shadow-lg text-white">
                                    <h1 className="text-3xl font-extrabold mb-4">Agenda Clienti</h1>
                                    <div className="flex gap-4 items-center">
                                        <input type="text" placeholder="Cerca..." className="flex-1 p-3 bg-slate-800 border border-slate-700 rounded-xl text-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                        <select className="p-3 bg-slate-800 rounded-xl text-sm font-bold" value={targetSeason} onChange={e => setTargetSeason(e.target.value)}>
                                            <option value="PE_27">PE 27</option><option value="AI_27">AI 27</option>
                                        </select>
                                    </div>
                                </header>
                                <div className="flex flex-col gap-3">
                                    {processedClients.main.map((c, idx) => renderClientCard(c, idx))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
