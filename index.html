        const getWorkingDaysElapsed = (startDate) => {
            if (!startDate) return 0;
            const start = new Date(startDate);
            const end = new Date();
            let count = 0;
            let cur = new Date(start);
            while (cur < end) {
                cur.setDate(cur.getDate() + 1);
                const day = cur.getDay();
                if (day !== 0 && day !== 6) count++;
            }
            return count;

        const HEADERS_MAP = {
            'lofficina': "L'Officina snc", 'circondato': "Circondato srl", 'eureka': "Eureka srl", 
            'magia': "Magia Diffusion", 'bio-optimus': "Bio Optimus", 'damalu': "Luisanne", 'verbenas': "Fun Verbenas"

        const AGENCY_PORTFOLIO = [
            { id: 'verbenas', name: 'Verbenas', profile: 'casual, estivo, accessibile' },
            { id: 'bio-optimus', name: 'Bio Optimus', profile: 'comfort, plantare, benessere' },
            { id: 'circondato', name: 'Circondato', profile: 'fashion, donna, trend' },
            { id: 'magia', name: 'Magia Diffusion', profile: 'classico, donna, pelle' },
            { id: 'luisanne', name: 'Luisanne', profile: 'boutique, elegante' }
        ];

        // API Key Gemini per Radar AI (Modello 1.5 Flash - Sicuro e Pubblico)
        const apiKey = "AIzaSyAAlh1oF3MsdwSBhe6CkX4hLDLqLUFJhYE"; 

        const LoginScreen = () => {

                            <h1 className="text-4xl font-black text-stone-800 tracking-tighter mb-2">Sales OS</h1>

                        </div>
                        {error && <div className="bg-rose-50 text-rose-600 p-4 rounded-2xl text-sm font-bold flex items-center justify-center gap-2 border border-rose-200"><Icons.AlertTriangle /> {error}</div>}
                        <div className="space-y-4 mt-4">
                            <div>
                                <label className="block text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2 pl-2">Email Operatore</label>
                                <input type="email" placeholder="nome@agenzia.com" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-5 bg-stone-50 border border-stone-200 rounded-2xl text-sm font-bold outline-none focus:border-emerald-500 focus:ring-4 ring-emerald-50 transition-all text-stone-800 shadow-inner" required />
                            </div>
                            <div>
                                <label className="block text-[11px] font-black text-stone-400 uppercase tracking-widest mb-2 pl-2">Password</label>
                                <input type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-5 bg-stone-50 border border-stone-200 rounded-2xl text-sm font-bold outline-none focus:border-emerald-500 focus:ring-4 ring-emerald-50 transition-all text-stone-800 shadow-inner" required />

                        <button type="submit" disabled={isLoggingIn} className="w-full bg-stone-900 text-white p-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-emerald-500 transition-colors shadow-lg mt-4 disabled:opacity-50 flex justify-center items-center gap-2">

                        Cloudflare Edge Network • Active
                    </div>

        };

        function App() {
            // Stato di base
            const [firebaseReady, setFirebaseReady] = useState(!!window.FirebaseOps);
            const [user, setUser] = useState(null);
            const [isInitializing, setIsInitializing] = useState(true);
            const [loading, setLoading] = useState(false);
            const [dbStatus, setDbStatus] = useState("Connessione...");
            
            // Dati
            const [customers, setCustomers] = useState([]);
            const [orders, setOrders] = useState([]);
            const [agenda, setAgenda] = useState([]);
            
            // UI State
            const [searchTerm, setSearchTerm] = useState('');
            const [targetSeason, setTargetSeason] = useState("PE_27");
            const [activeView, setActiveView] = useState("call-list"); // 'call-list', 'scouting', 'routing', 'historical'
            const [selectedClient, setSelectedClient] = useState(null);
            const [showChart, setShowChart] = useState(null); 
            const [showAddModal, setShowAddModal] = useState(false);
            const [newClientData, setNewClientData] = useState({ name: '', city: '', phone: '', agente: "L'Officina" });
            
            // Scouting State
            const [routingCity, setRoutingCity] = useState('');
            const [scoutCity, setScoutCity] = useState('');
            const [isScouting, setIsScouting] = useState(false);
            const [scoutResults, setScoutResults] = useState([]);

            const appId = 'app-ordini-2ce45'; 

            // Firebase Initialization Check
            useEffect(() => {
                if (!window.FirebaseOps) {
                    const handleReady = () => setFirebaseReady(true);
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }
            }, []);

            // Auth Listener
            useEffect(() => {
                if (!firebaseReady) return;
                const { auth, onAuthStateChanged } = window.FirebaseOps;
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setIsInitializing(false);
                    if (currentUser) {
                        setLoading(true);
                        loadData();
                    }
                });
                return () => unsubscribe();
            }, [firebaseReady]);

            const loadData = () => {
                const { db, collection, onSnapshot } = window.FirebaseOps;
                const paths = [
                    { id: 'app-ordini-2ce45', c: 'artifacts/app-ordini-2ce45/public/data/anagrafica_clienti', o: 'artifacts/app-ordini-2ce45/public/data/orders' },
                    { id: 'lofficina', c: 'artifacts/app-ordini-lofficina-1/public/data/anagrafica_clienti', o: 'artifacts/app-ordini-lofficina-1/public/data/orders' }
                ];
                
                paths.forEach(p => {
                    // Fetch Customers
                    onSnapshot(collection(db, p.c), s => {
                        const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setCustomers(prev => {
                            const map = new Map(prev.map(item => [item.name?.trim().toLowerCase(), item]));
                            data.forEach(item => map.set(item.name?.trim().toLowerCase(), item));
                            return Array.from(map.values());
                        });
                        setDbStatus("Online");
                    });
                    
                    // Fetch Orders
                    onSnapshot(collection(db, p.o), s => {
                        const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setOrders(prev => {
                            const map = new Map(prev.map(item => [item.id, item]));
                            data.forEach(item => map.set(item.id, item));
                            return Array.from(map.values());
                        });
                        setLoading(false);
                    });
                });
                
                // Fetch Agenda
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'agenda_luci'), s => {
                    setAgenda(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            };

            // Il Cervello Analitico (Elaborazione Dati, Churn, Cross-sell)
            const processedClients = useMemo(() => {
                const aggregator = {};
                const currentYear = parseInt(targetSeason.split('_')[1]);
                const prevSeasonCode = targetSeason.startsWith('PE') ? `PE_${currentYear - 1}` : `AI_${currentYear - 1}`;

                const initClient = (cName) => {
                    if (!aggregator[cName]) {
                        const rubrica = customers.find(c => c.name?.trim().toLowerCase() === cName.toLowerCase()) || {};
                        const statusRecord = agenda.find(a => a.clientName === cName) || { status: 'rosso', notes: '', lastUpdate: null };
                        const agente = (rubrica.agente || '').toLowerCase();
                        aggregator[cName] = {
                            name: cName, 
                            city: rubrica.city || 'N/D', 
                            phone: rubrica.phone || rubrica.cellulare || '', 
                            totalValue: 0,
                            lightStatus: statusRecord.status, 
                            notes: statusRecord.notes || '', 
                            lastUpdate: statusRecord.lastUpdate,
                            isMyAgent: !agente || agente.includes('officina') || agente.includes('quid'),
                            agenteAssegnato: agente || 'Non Assegnato',
                            brands: new Set(), 
                            headers: new Set(),
                            history: [], 
                            hasTargetSeason: false, 
                            previousSeasonValue: 0,
                            crossSellSuggestion: null, 
                            isChurnRisk: false, 
                            churnStatus: 'none'
                        };
                    }
                    return aggregator[cName];
                };

                customers.forEach(c => c.name && initClient(c.name.trim()));
                
                orders.forEach(o => {
                    const cName = o.clientData?.name?.trim();
                    if (!cName || cName === "Ignoto") return;
                    
                    const client = initClient(cName);
                    
                    const agenteOrdine = (o.orderMeta?.agente || o.clientData?.agente || '').toLowerCase();
                    if (agenteOrdine && client.agenteAssegnato === 'Non Assegnato') {
                        client.agenteAssegnato = agenteOrdine;
                        client.isMyAgent = agenteOrdine.includes('officina') || agenteOrdine.includes('quid');
                    }

                    if (o.orderMeta?.season === targetSeason) client.hasTargetSeason = true;
                    if (o.orderMeta?.season === prevSeasonCode) client.previousSeasonValue += (o.totals?.baseImponibileIva || 0);
                    
                    let orderBrands = [];
                    if (o.items) {
                        o.items.forEach(item => {
                            if(item.marchio) {
                                client.brands.add(item.marchio);
                                if(!orderBrands.includes(item.marchio)) orderBrands.push(item.marchio);
                            }
                        });
                    }

                    client.headers.add(o.headerKey);

                    client.history.push({ 
                        season: o.orderMeta?.season || 'N/D', 
                        pairs: o.totals?.totalPieces || 0, 
                        value: o.totals?.baseImponibileIva || 0,
                        header: HEADERS_MAP[o.headerKey] || o.headerKey,
                        brands: orderBrands.join(', ')
                    });
                    
                    client.totalValue += (o.totals?.baseImponibileIva || 0);
                });

                // Analisi Strategica Predittiva
                const today = new Date();
                const currentMonth = today.getMonth();
                
                Object.values(aggregator).forEach(c => {
                    // Calcolo Churn Risk (Se ha comprato la stagione precedente, ma non questa)
                    if (c.previousSeasonValue > 0 && !c.hasTargetSeason && c.isMyAgent) {
                        c.isChurnRisk = true;
                        const isPE = targetSeason.startsWith('PE');
                        const isAI = targetSeason.startsWith('AI');
                        
                        if (isPE) c.churnStatus = currentMonth > 5 ? 'red' : 'orange';
                        else if (isAI) c.churnStatus = currentMonth > 0 ? 'red' : 'orange';
                    }
                    
                    // Calcolo Cross-Sell Recommendation
                    if (c.totalValue > 0) {
                        const bArr = Array.from(c.brands).map(b => b.toLowerCase());
                        const missing = AGENCY_PORTFOLIO.find(p => !bArr.some(cb => cb.includes(p.id)) && !bArr.some(cb => cb.includes(p.name.toLowerCase())));
                        if (missing) {
                            let pitch = `Il cliente non ha mai trattato ${missing.name}. `;
                            if (missing.id === 'bio-optimus') pitch += "Ottima integrazione stabile: linea comfort con plantare.";
                            else if (missing.id === 'verbenas') pitch += "Ideale per spingere la vendita d'impulso estiva.";
                            else pitch += `Valuta l'inserimento per il suo posizionamento: ${missing.profile}.`;
                            c.crossSellSuggestion = { brand: missing.name, pitch };
                        }
                    }
                });

                let result = Object.values(aggregator).filter(c => !c.hasTargetSeason);
                
                if (searchTerm && activeView !== 'routing' && activeView !== 'scouting') {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(c => 
                        c.name.toLowerCase().includes(term) || 
                        Array.from(c.brands).some(b => b.toLowerCase().includes(term)) ||
                        Array.from(c.headers).some(h => (HEADERS_MAP[h] || h).toLowerCase().includes(term))
                    );
                }
                
                const main = result.filter(c => c.totalValue > 0 && c.isMyAgent);
                const historical = result.filter(c => !(c.totalValue > 0 && c.isMyAgent));
                
                let routingResults = { urgent: [], prospect: [], active: [] };
                if (activeView === 'routing' && routingCity.length > 2) {
                    const cityTerm = routingCity.toLowerCase().trim();
                    const inCity = Object.values(aggregator).filter(c => c.city.toLowerCase().includes(cityTerm));
                    
                    routingResults.urgent = inCity.filter(c => c.isChurnRisk);
                    routingResults.prospect = inCity.filter(c => c.totalValue === 0 || !c.isMyAgent);
                    routingResults.active = inCity.filter(c => (c.hasTargetSeason && c.isMyAgent) || (!c.isChurnRisk && c.totalValue > 0 && c.isMyAgent));
                }
                
                return {

                    const prompt = `Sei un Direttore Commerciale B2B spietato ed esperto in Italia, focalizzato sul fatturato.
                    Obiettivo: Estrarre un database massivo di prospect caldi.
                    Devi trovare IL MAGGIOR NUMERO POSSIBILE DI NEGOZI (almeno 15, fino a 30) nella città e provincia di: ${scoutCity}. 
                    Cerca: boutique di calzature indipendenti o negozi di abbigliamento multimarca di fascia media/alta che trattano anche scarpe.
                    
                    ISTRUZIONI:
                    Escludi i discount, le catene low-cost e il lusso estremo. Noi vendiamo: ${portfolioContext}.
                    Sii sintetico. La "reason" deve essere di MAX 5 PAROLE.
                    
                    Restituisci ESATTAMENTE e SOLO un array JSON valido in questo formato, senza markdown:
                    [{"name": "Nome Negozio", "address": "Indirizzo/Città", "phone": "Tel", "score": 85, "reason": "Motivo breve", "suggested_brand": "Brand da proporre"}]`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    
                    if (!res.ok) throw new Error("Errore API HTTP " + res.status);
                    const data = await res.json();
                    
                    let parsedData = [];
                    let content = data.candidates[0].content.parts[0].text;
                    const jsonMatch = content.match(/\[\s*\{[\s\S]*\}\s*\]/);
                    if (jsonMatch) parsedData = JSON.parse(jsonMatch[0]);
                    else parsedData = JSON.parse(content.replace(/```json/g, '').replace(/```/g, '').trim());

                                            <div className={`flex flex-1 lg:w-80 items-center border rounded-2xl px-5 py-4 focus-within:ring-2 transition-all shadow-inner ${activeView === 'call-list' ? 'bg-slate-800/80 border-slate-700 focus-within:ring-indigo-500/50 focus-within:border-indigo-400' : 'bg-stone-50 border-stone-200 focus-within:ring-indigo-100 focus-within:border-indigo-400'}`}>
                                                <Icons.Search className={`w-5 h-5 mr-3 shrink-0 ${activeView === 'call-list' ? 'text-slate-400' : 'text-stone-400'}`} />
                                                <input type="text" placeholder="Filtra cliente, città, marchio..." className={`w-full bg-transparent border-none outline-none font-bold text-sm ${activeView === 'call-list' ? 'text-white placeholder:text-slate-500' : 'text-stone-800 placeholder:text-stone-400'}`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                            </div>
                                            <select className={`p-4 rounded-2xl text-sm font-black outline-none cursor-pointer border shadow-md ${activeView === 'call-list' ? 'bg-slate-800 border-slate-700 text-indigo-300 hover:bg-slate-700' : 'bg-white border-stone-200 text-indigo-600 hover:bg-stone-50'}`} value={targetSeason} onChange={e => setTargetSeason(e.target.value)}>
                                                <option value="PE_27">PE 27</option>
                                                <option value="AI_27">AI 27</option>
                                            </select>
                                            <button onClick={() => setShowAddModal(true)} className={`px-5 py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center shrink-0 ${activeView === 'call-list' ? 'bg-indigo-500 hover:bg-indigo-400 text-white' : 'bg-stone-900 hover:bg-indigo-600 text-white'}`} title="Aggiungi Nuovo Prospect Manualmente"><Icons.Plus /></button>
                                        </div>
                                    </div>
                                </header>

                                <div className="grid grid-cols-1 gap-3 mt-4">
                                    {activeView === 'call-list' 
                                        ? processedClients.main.map((c, idx) => renderClientCard(c, idx))
                                        : processedClients.historical.map((c, idx) => renderClientCard(c, idx))
                                    }
                                </div>
                                
                                {activeView === 'call-list' && processedClients.main.length === 0 && (
                                    <div className="text-center p-16 bg-white rounded-[3rem] border border-stone-200 text-stone-400 text-lg font-bold shadow-sm mt-8">Nessun cliente attivo trovato. Prova a controllare l'Archivio Storico.</div>
                                )}
                                {activeView === 'historical' && processedClients.historical.length === 0 && (
                                    <div className="text-center p-16 bg-white rounded-[3rem] border border-stone-200 text-stone-400 text-lg font-bold shadow-sm mt-8">Nessun dato storico trovato per questi filtri.</div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* MODALE: AGGIUNGI PROSPECT MANUALE */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[3rem] shadow-2xl p-8 md:p-10 modal-fade-in border border-stone-200">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black text-stone-800 tracking-tighter">Nuovo Prospect</h3>
                                    <button onClick={() => setShowAddModal(false)} className="text-stone-400 hover:text-rose-500 transition-colors p-2 bg-stone-50 rounded-xl"><Icons.X /></button>
                                </div>
                                <form onSubmit={handleAddNewClient} className="space-y-6">
                                    <div>
                                        <label className="block text-[11px] font-black text-stone-400 uppercase mb-2 tracking-widest pl-2">Ragione Sociale</label>
                                        <input required type="text" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl text-sm font-bold outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 shadow-inner" value={newClientData.name} onChange={e => setNewClientData({...newClientData, name: e.target.value})} placeholder="Es. Boutique Rossi" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[11px] font-black text-stone-400 uppercase mb-2 tracking-widest pl-2">Città</label>
                                            <input type="text" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl text-sm font-bold outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 shadow-inner" value={newClientData.city} onChange={e => setNewClientData({...newClientData, city: e.target.value})} placeholder="Es. Milano" />
                                        </div>
                                        <div>
                                            <label className="block text-[11px] font-black text-stone-400 uppercase mb-2 tracking-widest pl-2">Telefono</label>
                                            <input type="text" className="w-full p-4 bg-stone-50 border border-stone-200 rounded-2xl text-sm font-bold outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 shadow-inner" value={newClientData.phone} onChange={e => setNewClientData({...newClientData, phone: e.target.value})} placeholder="Es. 02 123456" />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full mt-6 bg-indigo-600 text-white font-black text-sm uppercase tracking-widest p-5 rounded-2xl shadow-xl hover:bg-indigo-500 transition-all flex justify-center">
                                        Salva nel Database
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODALE: DETTAGLIO CLIENTE */}
                    {selectedClient && (
                        <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-3 md:p-6 overflow-y-auto">
                            <div className="bg-white w-full max-w-5xl rounded-[3rem] shadow-2xl overflow-hidden modal-fade-in my-auto max-h-[95vh] flex flex-col border border-stone-200 relative">
                                <div className="p-8 border-b border-stone-100 flex justify-between items-start bg-stone-50/50">
                                    <div className="flex items-center gap-6">
                                        <div className="w-16 h-16 rounded-2xl bg-indigo-50 border border-indigo-100 text-indigo-500 flex items-center justify-center hidden sm:flex shadow-inner">
                                            <Icons.Notebook className="w-8 h-8" />
                                        </div>
                                        <div>
                                            <h2 className="text-4xl font-black text-stone-800 tracking-tighter leading-none mb-3">{selectedClient.name}</h2>
                                            <p className="text-[11px] text-stone-500 font-black uppercase tracking-[0.2em] bg-white px-3 py-1.5 rounded-lg border border-stone-200 inline-block shadow-sm">
                                                {selectedClient.city} • {selectedClient.phone || 'Nessun recapito'}
                                            </p>
                                        </div>
                                        <button onClick={() => setShowChart(selectedClient)} className="ml-4 p-4 bg-white text-indigo-600 rounded-2xl shadow-sm border border-stone-200 hover:border-indigo-500 hover:bg-indigo-50 transition-all group" title="Vedi Analisi di Crescita">
                                            <Icons.Chart className="group-hover:scale-110 transition-transform" />
                                        </button>
                                    </div>
                                    <button onClick={() => setSelectedClient(null)} className="p-3 bg-white rounded-2xl border border-stone-200 text-stone-400 hover:text-rose-500 transition-colors shadow-sm"><Icons.X /></button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar bg-white">
                                    {selectedClient.isChurnRisk && (
                                        <div className={`p-6 rounded-[2rem] border flex items-center gap-5 shadow-sm ${selectedClient.churnStatus === 'red' ? 'bg-rose-50 border-rose-200 text-rose-700' : 'bg-orange-50 border-orange-200 text-orange-700'}`}>
                                            <div className={`p-4 rounded-xl bg-white shadow-sm ${selectedClient.churnStatus === 'red' ? 'text-rose-500 pulse-red' : 'text-orange-500 pulse-orange'}`}><Icons.AlertTriangle className="w-8 h-8" /></div>
                                            <div>
                                                <p className="text-[11px] font-black uppercase tracking-[0.2em] mb-1">Rischio Churn Rilevato</p>
                                                <p className="text-base font-bold leading-relaxed">Il cliente ha uno storico di <span className="font-black text-lg">€{selectedClient.previousSeasonValue.toLocaleString()}</span> ma non ha ancora ordinato per la stagione {targetSeason.replace('_', ' ')}.</p>
                                            </div>
                                        </div>
                                    )}
                                    
                                    {selectedClient.crossSellSuggestion && !selectedClient.isChurnRisk && (
                                        <div className="bg-indigo-50 border border-indigo-200 rounded-[2rem] p-6 flex items-start gap-5 shadow-sm">
                                            <div className="p-4 rounded-xl bg-white shadow-sm text-indigo-500"><Icons.Sparkles className="w-8 h-8" /></div>
                                            <div>
                                                <p className="text-[11px] font-black text-indigo-700 uppercase tracking-[0.2em] mb-1">Opportunità Strategica Predittiva</p>
                                                <p className="text-base text-indigo-600 font-extrabold italic leading-relaxed">"{selectedClient.crossSellSuggestion.pitch}"</p>
                                            </div>
                                        </div>
                                    )}
                                    
                                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                        <div className="xl:col-span-2 space-y-8">
                                            <div className="space-y-4">
                                                <h4 className="text-[12px] font-black text-stone-400 uppercase tracking-[0.2em] flex items-center gap-2 pl-2"><Icons.Notebook /> Annotazioni e Briefing</h4>
                                                <textarea className="w-full h-48 p-6 bg-stone-50 border border-stone-200 rounded-[2rem] outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition-all font-semibold text-stone-700 resize-none shadow-inner" placeholder="Es: Cliente interessato a nuovi marchi, richiamare per fissare appuntamento dopo il 15 del mese..." value={selectedClient.notes} onChange={e => setSelectedClient({...selectedClient, notes: e.target.value})} onBlur={() => saveClientData(selectedClient.name, null, selectedClient.notes)} />
                                            </div>
                                            <div className="space-y-4">
                                                <h4 className="text-[12px] font-black text-stone-400 uppercase tracking-[0.2em] flex items-center gap-2 pl-2"><Icons.History /> Cronologia Acquisti</h4>
                                                <div className="rounded-[2rem] border border-stone-200 overflow-hidden shadow-sm bg-white">
                                                    <table className="w-full text-sm text-left">
                                                        <thead className="bg-stone-50 text-[10px] font-black uppercase text-stone-400 border-b border-stone-200 tracking-widest">
                                                            <tr>
                                                                <th className="p-5 pl-6">Stagione</th>
                                                                <th className="p-5">Ditta</th>
                                                                <th className="p-5">Brand Acquistati</th>
                                                                <th className="p-5 text-center">Volumi</th>
                                                                <th className="p-5 text-right pr-6">Fatturato</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-stone-100 text-stone-700 font-bold">
                                                            {selectedClient.history.sort((a,b) => b.season.localeCompare(a.season)).map((h, i) => (
                                                                <tr key={i} className="hover:bg-indigo-50/30 transition-colors">
                                                                    <td className="p-5 pl-6 text-indigo-600 font-black">{h.season.replace('_', ' ')}</td>
                                                                    <td className="p-5 text-stone-500 text-[10px] font-black uppercase">{h.header}</td>
                                                                    <td className="p-5 text-[10px] uppercase text-stone-400 tracking-widest max-w-[150px] truncate" title={h.brands}>{h.brands}</td>
                                                                    <td className="p-5 text-center bg-stone-50/50">{h.pairs}</td>
                                                                    <td className="p-5 text-right pr-6 font-extrabold">€{h.value.toLocaleString()}</td>
                                                                </tr>
                                                            ))}
                                                            {selectedClient.history.length === 0 && (
                                                                <tr><td colSpan="5" className="p-8 text-center text-stone-400 text-sm font-bold">Nessun ordine storico presente nel database.</td></tr>
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="bg-stone-50 p-6 rounded-[2.5rem] border border-stone-200 shadow-inner space-y-4">
                                                <h4 className="text-[11px] font-black text-stone-400 uppercase tracking-widest text-center mb-4">Pannello di Controllo Operativo</h4>
                                                <button onClick={() => saveClientData(selectedClient.name, 'verde')} className={`w-full p-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-between transition-all border shadow-sm ${selectedClient.lightStatus === 'verde' ? 'bg-emerald-500 text-white border-emerald-600' : 'bg-white text-emerald-600 border-stone-200 hover:border-emerald-300'}`}>Fissato <div className="w-3 h-3 rounded-full bg-current shadow-inner"></div></button>
                                                <button onClick={() => saveClientData(selectedClient.name, 'giallo')} className={`w-full p-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-between transition-all border shadow-sm ${selectedClient.lightStatus === 'giallo' ? 'bg-amber-500 text-white border-amber-600' : 'bg-white text-amber-500 border-stone-200 hover:border-amber-300'}`}>Da Richiamare <div className="w-3 h-3 rounded-full bg-current shadow-inner"></div></button>
                                                <button onClick={() => saveClientData(selectedClient.name, 'rosso')} className={`w-full p-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-between transition-all border shadow-sm ${selectedClient.lightStatus === 'rosso' ? 'bg-rose-500 text-white border-rose-600' : 'bg-white text-rose-500 border-stone-200 hover:border-rose-300'}`}>Nessun Contatto <div className="w-3 h-3 rounded-full bg-current shadow-inner"></div></button>
                                            </div>
                                            <button onClick={() => window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Meeting Sales OS: '+selectedClient.name)}&details=${encodeURIComponent('Tel: '+selectedClient.phone+'\nNote: '+selectedClient.notes)}`, '_blank')} className="w-full bg-stone-900 text-white p-5 rounded-[2rem] font-black text-[11px] uppercase tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-indigo-600 transition-all shadow-xl shadow-stone-900/20"><Icons.Calendar className="w-5 h-5" /> Pianifica in Calendar</button>
                                            <div className="text-center pt-2">
                                                <p className="text-[9px] font-black text-stone-300 uppercase tracking-[0.2em]">Ultimo Update: {selectedClient.lastUpdate ? new Date(selectedClient.lastUpdate).toLocaleString('it-IT', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'Mai effettuato'}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODALE: GRAFICO ANALISI CRESCITA SVG */}
                    {showChart && (
                        <div className="fixed inset-0 bg-stone-900/90 backdrop-blur-md z-[200] flex items-center justify-center p-4" onClick={() => setShowChart(null)}>
                            <div className="bg-white w-full max-w-3xl rounded-[3rem] p-10 md:p-12 shadow-2xl modal-fade-in border border-stone-200 flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-12">
                                    <div>
                                        <p className="text-[11px] font-black text-indigo-500 uppercase tracking-[0.3em] mb-2 flex items-center gap-2"><Icons.Chart className="w-4 h-4"/> Performance Analytics</p>
                                        <h3 className="text-4xl md:text-5xl font-black text-stone-800 tracking-tighter leading-none">{showChart.name}</h3>
                                    </div>
                                    <button onClick={() => setShowChart(null)} className="p-3 text-stone-400 hover:text-stone-800 bg-stone-50 rounded-2xl transition-colors border border-stone-200"><Icons.X /></button>
                                </div>
                                
                                <div className="h-80 flex items-end justify-around gap-4 md:gap-8 border-b-2 border-stone-100 pb-4 relative mt-auto">
                                    {showChart.history.length === 0 ? (
                                        <div className="absolute inset-0 flex items-center justify-center text-stone-400 font-bold text-sm uppercase tracking-widest">Nessun dato storico per generare il grafico</div>
                                    ) : (
                                        showChart.history.sort((a,b) => a.season.localeCompare(b.season)).map((h, i) => {
                                            const maxVal = Math.max(...showChart.history.map(x => x.value), 100);
                                            const height = Math.max((h.value / maxVal) * 100, 5); // Almeno 5% di altezza per far vedere la barra
                                            return (
                                                <div key={i} className="flex-1 flex flex-col items-center gap-3 h-full justify-end group">
                                                    <div className="opacity-0 group-hover:opacity-100 transition-all bg-stone-900 text-white text-[10px] font-black px-3 py-2 rounded-xl mb-2 shadow-xl whitespace-nowrap transform translate-y-2 group-hover:translate-y-0">
                                                        € {h.value.toLocaleString()} <br/> <span className="text-stone-400 font-bold uppercase tracking-widest text-[8px]">{h.pairs} paia</span>
                                                    </div>
                                                    <div className="w-full max-w-[80px] bg-indigo-50 rounded-t-2xl relative overflow-hidden group-hover:bg-indigo-100 transition-all cursor-crosshair shadow-inner" style={{height: `${height}%`}}>
                                                        <div className="absolute inset-0 bg-gradient-to-t from-indigo-600 to-indigo-400 opacity-90 group-hover:opacity-100 transition-all"></div>
                                                    </div>
                                                    <div className="text-[11px] font-black text-stone-400 uppercase tracking-widest pt-2">{h.season.replace('_', ' ')}</div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                                
                                <div className="mt-10 flex flex-col md:flex-row justify-between md:items-center font-black text-[11px] text-stone-400 uppercase tracking-[0.2em] bg-stone-50 p-6 rounded-3xl border border-stone-100">
                                    <span className="flex flex-col gap-1">Valore Storico Cumulato <span className="text-indigo-600 text-2xl font-black">€{showChart.totalValue.toLocaleString()}</span></span>
                                    <span className="mt-4 md:mt-0 bg-white px-4 py-2 rounded-xl border border-stone-200 shadow-sm text-stone-500">Analisi su {showChart.history.length} stagioni</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
